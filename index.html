<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide Color Changer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  </head>
  <body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden">
    <div id="app" class="flex flex-col h-full">

      <!-- Header -->
      <header class="text-center py-4 px-4 shrink-0">
        <h1 class="text-3xl font-bold text-white">Slide Color Changer</h1>
        <p class="text-gray-400 mt-1">Upload a .pptx, remap colors, download the result. Fully in-browser, fully private.</p>
      </header>

      <!-- Drop Zone -->
      <div id="dropzone"
        class="mx-auto w-full max-w-3xl border-2 border-dashed border-gray-600 rounded-2xl p-12 text-center cursor-pointer
               hover:border-indigo-500 hover:bg-gray-900 transition-colors duration-200"
        role="button" tabindex="0">
        <input type="file" id="file-input" accept=".pptx" class="hidden" />
        <div class="space-y-3">
          <svg class="mx-auto h-12 w-12 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
          <p class="text-lg text-gray-300">Drop a <strong>.pptx</strong> file here or <span class="text-indigo-400 underline">click to browse</span></p>
          <p class="text-sm text-gray-500">Your file never leaves your browser</p>
        </div>
      </div>

      <!-- Loading spinner -->
      <div id="loading" class="hidden text-center py-12">
        <div class="inline-block h-10 w-10 animate-spin rounded-full border-4 border-indigo-500 border-t-transparent"></div>
        <p class="mt-3 text-gray-400" id="loading-text">Processing presentation...</p>
      </div>

      <!-- Main content (hidden until file loaded) -->
      <div id="main-content" class="hidden flex flex-col flex-1 min-h-0">

        <!-- Toolbar (fixed, non-scrolling) -->
        <div id="toolbar" class="shrink-0 z-20 bg-gray-950/95 backdrop-blur-sm px-4 py-3 border-b border-gray-800/50">
          <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <h2 class="text-lg font-semibold truncate" id="file-name"></h2>
              <span class="text-sm text-gray-500 shrink-0" id="slide-count"></span>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button id="btn-new-file"
                class="px-3 py-1.5 text-sm rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 transition-colors">
                New File
              </button>
              <button id="btn-reset-all"
                class="px-3 py-1.5 text-sm rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 transition-colors">
                Reset All
              </button>
              <button id="btn-download"
                class="px-4 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition-colors flex items-center gap-2">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download .pptx
              </button>
            </div>
          </div>
        </div>

        <!-- Content area: single-scroll on mobile, dual independent scroll on lg -->
        <div class="flex-1 min-h-0 overflow-y-auto lg:overflow-hidden lg:flex lg:gap-6 max-w-7xl mx-auto w-full px-4 py-4">

          <!-- Left: Slide previews -->
          <div class="min-w-0 lg:flex-1 lg:overflow-y-auto">
            <div id="slides-container" class="space-y-4">
              <!-- Slides rendered here -->
            </div>
          </div>

          <!-- Right: Color table -->
          <div class="mt-6 lg:mt-0 lg:w-[320px] lg:shrink-0 lg:flex lg:flex-col lg:min-h-0">
            <div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden flex flex-col max-h-80 lg:max-h-none lg:flex-1 lg:min-h-0">
              <div class="px-4 py-3 border-b border-gray-800 shrink-0">
                <h3 class="font-semibold">Color Map</h3>
                <p class="text-xs text-gray-500 mt-0.5">Click a slide to pick colors. Click a swatch to change it.</p>
                <label class="flex items-center gap-2 mt-2 text-xs text-gray-400 cursor-pointer select-none">
                  <input type="checkbox" id="chk-include-images" class="accent-indigo-500 rounded" />
                  Include image colors
                </label>
              </div>
              <div id="color-table" class="divide-y divide-gray-800 overflow-y-auto">
                <!-- Color rows rendered here -->
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
